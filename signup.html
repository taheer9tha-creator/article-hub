<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account | ArticleHub</title>

<link rel="stylesheet" href="css/login.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="icon" href="images/indexfevicon1.png">
</head>

<body>

<div class="login-container">
<div class="login-box">
<h2>Create Account</h2>
<p>Join ArticleHub and start publishing your own articles.</p>
<form id="signupForm">

<input
type="text"
id="username"
placeholder="Username"
autocomplete="off"
required>

<small id="usernameStatus"></small>

<input
type="email"
id="email"
placeholder="Email Address"
required>

<input
type="password"
id="password"
placeholder="Password"
required>

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password"
required>

<div id="passwordStatus" class="password-status">
At least 8 characters, 1 letter and 1 number
</div>

<button
id="signupButton"
type="submit">
Create Account
</button>

</form>
<p class="signup-link">
Already have an account?

<a href="login.html">
Login
</a>

</p>
</div>
</div>

<script type="module" src="js/signup.js"></script>

</body>
</html>
