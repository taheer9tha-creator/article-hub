<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Login | ArticleHub</title>

<link rel="stylesheet"
href="css/login.css">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="icon" href="images/indexfevicon1.png">
</head>

<body>

<div class="login-container">

    <div class="login-box">

        <h1>

            ArticleHub

        </h1>

        <h2>

            Welcome Back

        </h2>

        <p class="login-text">

            Login to continue reading and publishing amazing articles.

        </p>

        <form id="loginForm">

            <input
            type="email"
            id="email"
            placeholder="Email Address"
            required>

            <input
            type="password"
            id="password"
            placeholder="Password"
            required>

            <button type="submit">

                Login

            </button>

        </form>

        <p
        id="error"
        class="error-message">

        </p>

        <p class="signup-link">

            Don't have an account?

            <a href="signup.html">

                Create Account

            </a>

        </p>

    </div>

</div>

<script
type="module"
src="js/login.js">

</script>

</body>

</html>
